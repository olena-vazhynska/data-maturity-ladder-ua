                        'Розгорнути моделі МЛ для прогнозного спрямування у всіх районах',
                        'Встановити огляд етики та справедливості для рішень на основі AI (уникнути дискримінаційного спрямування)',
                        'Створити цикли зворотного зв\'язку: результати інспекцій постійно покращують прогнози моделі',
                        'Розширити на моделі з кількома ризиками: поєднання трудових, охорони праці, заробітної плати, неформальності та даних ланцюга поставок',
                        'Побудувати автоматизовані системи раннього попередження для сценаріїв високого ризику (сезонна міграція, неоголошений найм)',
                        'Партнерство з університетами або дослідницькими інститутами для передової аналітики'
                    ]
                }
            ]
        };

        let state = { name: '', answers: {} };

        function init() {
            renderList();
        }

        function renderList() {
            let html = '';
            data.names.forEach(n => {
                html += `<button onclick="selectName('${n}')">${n}</button>`;
            });
            document.getElementById('list').innerHTML = html;
        }

        function filterList() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = data.names.filter(n => n.toLowerCase().includes(search));
            let html = '';
            filtered.forEach(n => {
                html += `<button onclick="selectName('${n}')">${n}</button>`;
            });
            document.getElementById('list').innerHTML = html;
        }

        function selectName(name) {
            state.name = name;
            state.answers = {};
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
            document.getElementById('name2').textContent = name;
            renderQuestions();
        }

        function renderQuestions() {
            let html = '';
            data.questions.forEach(q => {
                html += `
                    <div class="question-card">
                        <div class="question-label">${q.label}</div>
                        <div class="question-title">${q.title}</div>
                        <div class="question-scenario">📍 <strong>Сценарій:</strong> ${q.scenario}</div>
                        <div class="options">
                            ${[1,2,3,4,5].map(i => `<button class="opt" onclick="answer('${q.id}', ${i})" data-q="${q.id}" data-v="${i}"> ${i} </button>`).join('')}
                        </div>
                        <div style="color:#94a3b8; font-size:11px; margin-top:12px;">1 = Аналоговий  |  5 = Повністю передовий</div>
                    </div>
                `;
            });
            document.getElementById('questions').innerHTML = html;
        }

        function answer(qid, val) {
            state.answers[qid] = val;
            document.querySelectorAll(`[data-q="${qid}"]`).forEach(b => b.classList.remove('selected'));
            document.querySelector(`[data-q="${qid}"][data-v="${val}"]`).classList.add('selected');
            updateProgress();
        }

        function updateProgress() {
            const count = Object.keys(state.answers).length;
            const pct = (count / 6) * 100;
            document.getElementById('prog').style.width = pct + '%';
            document.getElementById('prog-text').textContent = `${count} з 6 відповідей`;
            document.getElementById('submit-btn').disabled = count < 6;
        }

        function showResults() {
            const vals = Object.values(state.answers);
            const avg = Math.round(vals.reduce((a,b)=>a+b,0) / vals.length);
            const lvl = Math.max(1, Math.min(5, avg));
            const level = data.levels[lvl - 1];
            const nextLevel = lvl < 5 ? data.levels[lvl] : null;

            let html = `
                <div class="badge" style="background: linear-gradient(135deg, ${level.color} 0%, ${level.color}cc 100%);">
                    ${level.emoji} Рівень ${lvl}: ${level.name}
                </div>

                <div class="result-section">
                    <div class="result-title">Ваш поточний стан</div>
                    <div class="result-description">${level.summary}</div>
                </div>

                <div class="result-section">
                    <div class="result-title">Ефективність за категоріями</div>
            `;

            data.questions.forEach(q => {
                const score = state.answers[q.id] || 0;
                html += `
                    <div class="category-item">
                        <div class="category-name">${q.label}</div>
                        <div class="bar"><div class="bar-fill" style="width:${(score/5)*100}%;"></div></div>
                        <div style="color:#64748b; font-size:12px;">Оцінка: ${score}/5</div>
                    </div>
                `;
            });

            html += `
                </div>

                <div class="result-section">
                    <div class="result-title">Що це означає</div>
                    <div style="background:#f8fafc; padding:18px; border-radius:8px; border-left:4px solid ${level.color};">
                        <div style="color:#1e293b; font-weight:600; margin-bottom:10px;">Ключові характеристики рівня ${lvl}:</div>
                        <ul style="margin-left:20px; color:#475569; font-size:13px; line-height:1.8;">
                            ${level.characteristics.map(c => `<li style="margin-bottom:6px;">${c}</li>`).join('')}
                        </ul>
                    </div>
                </div>

                <div class="result-section">
                    <div class="result-title">Рекомендовані наступні кроки</div>
                    <div style="display:grid; gap:12px;">
                        ${level.actions.map(a => `
                            <div class="action-box">
                                <div class="action-title">✓ ${a}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            if (nextLevel) {
                html += `
                    <div class="result-section">
                        <div class="result-title">Шлях до рівня ${lvl + 1}: ${nextLevel.name}</div>
                        <div class="result-level">
                            <div class="result-level-title">${nextLevel.emoji} Як виглядає рівень ${lvl + 1}</div>
                            <div class="result-level-text">${nextLevel.summary}</div>
                        </div>
                    </div>
                `;
            }

            html += `
                <div class="result-section">
                    <div class="result-title">Ваша подорож зрілості даних</div>
                    <div class="ladder">
            `;

            data.levels.forEach((l, i) => {
                const isAtOrBelow = i < lvl;
                const isCurrent = i === (lvl - 1);
                html += `
                    <div class="ladder-item">
                        <div class="ladder-num" style="color:${isCurrent ? l.color : '#cbd5e1'};">${l.lvl}</div>
                        <div class="ladder-bar">
                            <div class="ladder-bar-fill" style="width:${isCurrent ? '100%' : isAtOrBelow ? '100%' : '0%'}; background:${l.color};"></div>
                        </div>
                        <div class="ladder-label" style="color:${isCurrent ? '#1e293b' : '#94a3b8'}; font-weight:${isCurrent ? '700' : '500'};">${l.name}${isCurrent ? ' (Ви тут)' : ''}</div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            document.getElementById('name3').textContent = state.name;
            document.getElementById('results').innerHTML = html;
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen3').classList.remove('hidden');
        }

        function goBack() {
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen1').classList.remove('hidden');
        }

        function startOver() {
            state = { name: '', answers: {} };
            document.getElementById('search').value = '';
            document.getElementById('screen3').classList.add('hidden');
            document.getElementById('screen1').classList.remove('hidden');
            renderList();
        }

        init();
    </script>
</body>
</html>
